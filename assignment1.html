<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 70%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="radio"] {
            margin-top: 10px;
        }

        input[type="submit"] {
            background-color: darkblue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: navy;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table,
        th,
        td {
            border: 1px solid gray;
        }

        th {
            background-color: darkblue;
            color: white;
            padding: 10px;
        }

        td {
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Student Registration Form</h1>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter phone number">

            <label>Date of Birth</label>
            <input type="date">

            <label>Select Course</label>
            <select>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>React</option>
            </select>

            <label>Gender</label><br><br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

            <label>Address</label>
            <textarea rows="5" placeholder="Enter address"></textarea>

            <input type="submit" value="Register">

        </form>

        <h1>Student Data Table</h1>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>City</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>HTML</td>
                <td>Mumbai</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sneha</td>
                <td>CSS</td>
                <td>Pune</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Amit</td>
                <td>JavaScript</td>
                <td>Nashik</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Priya</td>
                <td>React</td>
                <td>Nagpur</td>
            </tr>

        </table>

    </div>

</body>

</html>
