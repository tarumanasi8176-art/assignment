<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <h1>Student Registration Form</h1>
    </center>

    <form>

        <label><b>Full Name</b></label><br>
        <input type="text" placeholder="Enter your name" size="80"><br><br>

        <label><b>Email</b></label><br>
        <input type="email" placeholder="Enter your email" size="80"><br><br>

        <label><b>Password</b></label><br>
        <input type="password" placeholder="Enter password" size="80"><br><br>

        <label><b>Phone Number</b></label><br>
        <input type="tel" placeholder="Enter phone number" size="80"><br><br>

        <label><b>Date of Birth</b></label><br>
        <input type="date" size="80"><br><br>

        <label><b>Select Course</b></label><br>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
        </select><br><br>

        <label><b>Gender</b></label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label><b>Address</b></label><br>
        <textarea rows="5" cols="70" placeholder="Enter address"></textarea>
        <br><br>

        <input type="submit" value="Register">

    </form>
    <br><br>

    <center>
        <h1>Student Data Table</h1>
    </center>

    <table border="1" cellpadding="10" cellspacing="0" width="70%" align="center">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Rahul</td>
            <td>HTML</td>
            <td>Mumbai</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Sneha</td>
            <td>CSS</td>
            <td>Pune</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Amit</td>
            <td>JavaScript</td>
            <td>Nashik</td>
        </tr>

        <tr>
            <td>4</td>
            <td>Priya</td>
            <td>React</td>
            <td>Nagpur</td>
        </tr>

    </table>


</body>

</html>
